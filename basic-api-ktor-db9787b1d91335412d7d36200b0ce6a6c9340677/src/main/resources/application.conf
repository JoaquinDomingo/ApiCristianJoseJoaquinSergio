ktor {
  application {
    modules = [com.ktor.MyApplicationKt.myModule]
  }
  deployment {
    port = 8081
    host = "localhost"  # ip del servidor
  }
}

# ¡El bloque database va fuera del bloque ktor!
database {
  # Para usar MySQL con docker-compose:
  # url = "jdbc:mysql://localhost:3306/dbEmployee"
  # driver = "com.mysql.cj.jdbc.Driver"
  # user = "santi"
  # password = "santi"
  # maxPoolSize = 10

  # Valor por defecto: H2 en disco (build/db/consoles)
  url = ${?DB_URL}
  driver = ${?DB_DRIVER}
  user = ${?DB_USER}
  password = ${?DB_PASSWORD}
  maxPoolSize = ${?DB_MAX_POOL_SIZE}
}