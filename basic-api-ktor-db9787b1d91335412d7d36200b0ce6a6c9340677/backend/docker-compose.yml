version: "3.8"

services:
  db:
    image: mariadb:10.11
    container_name: backend-db
    environment:
      MYSQL_DATABASE: dbConsole
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./dump:/docker-entrypoint-initdb.d:ro
    networks:
      - backend-network

  api:
    build: ../
    container_name: backend-api
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      DB_URL: "jdbc:mariadb://db:3306/dbConsole"
      DB_DRIVER: "org.mariadb.jdbc.Driver"
      DB_USER: "admin"
      DB_PASSWORD: "admin"
      DB_MAX_POOL_SIZE: "10"
    networks:
      - backend-network
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: backend-phpmyadmin
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: admin
      PMA_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: rootpass
    networks:
      - backend-network

volumes:
  persistent:

networks:
  backend-network:
    driver: bridge
